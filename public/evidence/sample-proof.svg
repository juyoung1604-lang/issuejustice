<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-label="증빙자료 샘플">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  <rect width="1280" height="900" fill="url(#bg)" />
  <rect x="80" y="70" width="1120" height="760" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" />
  <rect x="120" y="115" width="270" height="34" rx="8" fill="#ef4444" opacity="0.14" />
  <text x="125" y="140" font-size="23" font-family="Noto Sans KR, Arial, sans-serif" fill="#b91c1c" font-weight="700">시민신문고 증빙자료 샘플</text>
  <text x="120" y="190" font-size="28" font-family="Noto Sans KR, Arial, sans-serif" fill="#0f172a" font-weight="700">처분서 / 공문 / 판결문 미리보기 화면</text>
  <text x="120" y="226" font-size="17" font-family="Noto Sans KR, Arial, sans-serif" fill="#475569">실서비스에서는 승인된 첨부자료의 원본 URL이 이 뷰어에 로드됩니다.</text>

  <rect x="120" y="265" width="1040" height="2" fill="#e2e8f0" />

  <text x="120" y="320" font-size="17" font-family="Noto Sans KR, Arial, sans-serif" fill="#334155" font-weight="700">문서 개요</text>
  <text x="120" y="352" font-size="16" font-family="Noto Sans KR, Arial, sans-serif" fill="#475569">- 사건번호: 2026-ISSUE-001</text>
  <text x="120" y="382" font-size="16" font-family="Noto Sans KR, Arial, sans-serif" fill="#475569">- 작성일자: 2026-03-10</text>
  <text x="120" y="412" font-size="16" font-family="Noto Sans KR, Arial, sans-serif" fill="#475569">- 기관유형: 구청 / 세무 / 경찰</text>

  <text x="120" y="468" font-size="17" font-family="Noto Sans KR, Arial, sans-serif" fill="#334155" font-weight="700">핵심 내용</text>
  <text x="120" y="500" font-size="16" font-family="Noto Sans KR, Arial, sans-serif" fill="#475569">동일 행위에 대한 지역별 처분 편차가 반복적으로 발견되어 증빙자료를 첨부함.</text>
  <text x="120" y="530" font-size="16" font-family="Noto Sans KR, Arial, sans-serif" fill="#475569">개인정보는 비식별 처리 후 제출되었으며, 본 화면은 뷰어 기능 확인용 샘플입니다.</text>

  <rect x="120" y="590" width="1040" height="170" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="145" y="635" font-size="16" font-family="Noto Sans KR, Arial, sans-serif" fill="#334155" font-weight="700">검토 메모</text>
  <text x="145" y="668" font-size="15" font-family="Noto Sans KR, Arial, sans-serif" fill="#64748b">- 첨부자료 유형과 원본명을 유지한 채 뷰어에서 즉시 확인 가능</text>
  <text x="145" y="696" font-size="15" font-family="Noto Sans KR, Arial, sans-serif" fill="#64748b">- PDF / 이미지는 인라인 미리보기, 기타 형식은 새 탭 열기 제공</text>
  <text x="145" y="724" font-size="15" font-family="Noto Sans KR, Arial, sans-serif" fill="#64748b">- Storage 비공개 버킷은 attachment ID로 signed URL 재발급 후 뷰어 로드</text>
</svg>
